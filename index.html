<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta ini wajib biar gak kekecilan di HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio Fatur</title>
    <style>
        /* Reset & Full Screen */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0f0c29; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 10px;
        }

        /* Card Full width untuk mobile */
        .card { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px); 
            padding: 25px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            width: 100%; 
            max-width: 500px; /* Biar gak terlalu lebar di desktop */
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .profile-pic { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #00d2ff; margin-bottom: 10px; }
        
        .social-box { display: flex; gap: 10px; margin: 20px 0; }
        .social-btn { flex: 1; background: #00d2ff; padding: 12px; border-radius: 8px; text-decoration: none; color: #000; font-weight: bold; font-size: 14px; }

        .sertifikat-preview { width: 100%; border-radius: 8px; border: 2px dashed #00d2ff; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <img src="l.jpg" class="profile-pic" alt="Fatur">
